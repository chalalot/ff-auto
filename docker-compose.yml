version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ffauto}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ffauto}
      - POSTGRES_DB=${POSTGRES_DB:-ffauto}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ff-shared-net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./Sorted:/app/Sorted
      - ./processed:/app/processed
      - ./results:/app/results
      - ./prompts:/app/prompts
      - ./image_logs.db:/app/image_logs.db
      - ./evaluations.db:/app/evaluations.db
      - ./soulie-gcp-bucket.json:/app/soulie-gcp-bucket.json:ro
      - ./ff-auto-drive.json:/app/ff-auto-drive.json:ro
      # Archive: read-only mounts from other server environments
      - /mnt/source/main-server/results:/app/archive/main-server/results:ro
      - /mnt/source/main-server/processed:/app/archive/main-server/processed:ro
      - /mnt/source/test-server/results:/app/archive/test-server/results:ro
      - /mnt/source/test-server/processed:/app/archive/test-server/processed:ro
      - /mnt/source/test-server-2/results:/app/archive/test-server-2/results:ro
      - /mnt/source/test-server-2/processed:/app/archive/test-server-2/processed:ro
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://global-redis:6379/1
      - CELERY_RESULT_BACKEND=redis://global-redis:6379/2
      - GCS_CREDENTIALS_PATH=/app/soulie-gcp-bucket.json
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ffauto}:${POSTGRES_PASSWORD:-ffauto}@postgres:5432/${POSTGRES_DB:-ffauto}
    networks:
      - ff-shared-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ff-shared-net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.celery_app worker -B --loglevel=info --concurrency=2 -Q image
    volumes:
      - ./Sorted:/app/Sorted
      - ./processed:/app/processed
      - ./results:/app/results
      - ./prompts:/app/prompts
      - ./image_logs.db:/app/image_logs.db
      - ./evaluations.db:/app/evaluations.db
      - ./soulie-gcp-bucket.json:/app/soulie-gcp-bucket.json:ro
      - ./ff-auto-drive.json:/app/ff-auto-drive.json:ro
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://global-redis:6379/1
      - CELERY_RESULT_BACKEND=redis://global-redis:6379/2
      - GCS_CREDENTIALS_PATH=/app/soulie-gcp-bucket.json
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ffauto}:${POSTGRES_PASSWORD:-ffauto}@postgres:5432/${POSTGRES_DB:-ffauto}
    networks:
      - ff-shared-net
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy

  video_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=2 -Q video
    volumes:
      - ./raw_video:/app/raw_video
      - ./soulie-gcp-bucket.json:/app/soulie-gcp-bucket.json:ro
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://global-redis:6379/1
      - CELERY_RESULT_BACKEND=redis://global-redis:6379/2
      - GCS_CREDENTIALS_PATH=/app/soulie-gcp-bucket.json
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ffauto}:${POSTGRES_PASSWORD:-ffauto}@postgres:5432/${POSTGRES_DB:-ffauto}
    networks:
      - ff-shared-net
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  pgdata:

networks:
  ff-shared-net:
    external: true
